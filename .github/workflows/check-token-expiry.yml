name: Check GitHub PAT Expiry

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 AM UTC
  workflow_dispatch:      # Allow manual runs

jobs:
  check-token-expiry:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check PAT expiration date
        id: check-expiry
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
        run: |
          # Make an API call with the PAT and read the expiry header
          EXPIRY_HEADER=$(curl -sI \
            -H "Authorization: token $GITHUB_PAT" \
            https://api.github.com/user \
            | grep -i "github-authentication-token-expiration" \
            | sed 's/github-authentication-token-expiration: //i' \
            | tr -d '\r\n')

          echo "Raw expiry header: $EXPIRY_HEADER"

          if [ -z "$EXPIRY_HEADER" ]; then
            echo "::error::Could not read token expiry. The PAT may be missing or already expired."
            exit 1
          fi

          # Parse the date (format: "2026-01-15 00:00:00 UTC")
          EXPIRY_EPOCH=$(date -d "$EXPIRY_HEADER" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

          echo "Token expires on: $EXPIRY_HEADER"
          echo "Days remaining: $DAYS_LEFT"

          echo "days_left=$DAYS_LEFT" >> "$GITHUB_OUTPUT"
          echo "expiry_date=$EXPIRY_HEADER" >> "$GITHUB_OUTPUT"

      - name: Create alert issue if expiry is within 14 days
        if: steps.check-expiry.outputs.days_left != '' && fromJson(steps.check-expiry.outputs.days_left) <= 14
        uses: actions/github-script@v7
        env:
          DAYS_LEFT: ${{ steps.check-expiry.outputs.days_left }}
          EXPIRY_DATE: ${{ steps.check-expiry.outputs.expiry_date }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const daysLeft = process.env.DAYS_LEFT;
            const expiryDate = process.env.EXPIRY_DATE;

            // Avoid duplicate issues: skip if one is already open with the label
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'token-expiry',
            });

            if (existing.data.length > 0) {
              console.log('Open token-expiry issue already exists — skipping creation.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ GITHUB_PAT expires in ${daysLeft} day(s) — renewal needed`,
              body: [
                '## GitHub PAT Expiry Alert',
                '',
                `The \`GITHUB_PAT\` Replit secret expires on **${expiryDate}** — only **${daysLeft} day(s)** away.`,
                '',
                'Without a valid PAT, pushes to \`.github/workflows/\` will fail silently.',
                '',
                '### How to renew',
                '1. Go to [GitHub → Settings → Developer Settings → Fine-grained tokens](https://github.com/settings/tokens?type=beta)',
                '2. Find the token for this project and click **Regenerate token** (keep the same permissions: *Contents: write* + *Workflows: write*)',
                '3. Copy the new token value',
                '4. Open **Replit → Secrets → `GITHUB_PAT`** and replace the old value with the new one',
                '5. Verify by running `bash push_to_github.sh` — it should succeed without auth errors',
                '',
                '> This issue was created automatically by the [Check GitHub PAT Expiry workflow](/.github/workflows/check-token-expiry.yml).',
              ].join('\n'),
              labels: ['token-expiry'],
            });

            console.log(`Issue created: PAT expires in ${daysLeft} day(s)`);
