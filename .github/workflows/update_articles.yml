name: Update Articles

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install feedparser openai

      - name: Update articles
        run: python update_articles.py

      - name: Generate daily opinion article (6 AM run only)
        if: github.event_name == 'workflow_dispatch' || contains(github.event.schedule, '0 6')
        run: python generate_opinion.py
        continue-on-error: true

      - run: |
          git config user.name "Horn Updates Bot"
          git config user.email "bot@hornupdates.com"
          git add articles.json opinion.html opinion-auto-*.html
          git diff --cached --quiet && echo "No changes" || git commit -m "Auto-update articles + opinion $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
