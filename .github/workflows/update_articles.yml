name: Update Articles

on:
  schedule:
    - cron: "0 6 * * *"    # 6:00 AM UTC every day
    - cron: "0 15 * * *"   # 3:00 PM UTC every day (twice daily)
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser

      - name: Run scraper
        run: python update_articles.py

      - name: Commit and push
        run: |
          git config user.name "Horn Updates Bot"
          git config user.email "bot@hornupdates.com"
          git add articles.json opinion.html opinion-auto-*.html sitemap.xml robots.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update articles + opinion $(date -u '+%Y-%m-%d %H:%M UTC') [skip actions]"
            git pull --rebase origin main
            git push
          fi
