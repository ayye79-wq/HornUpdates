name: Update Articles

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install feedparser openai
      - run: python update_articles.py
      - run: |
          git config user.name "Horn Updates Bot"
          git config user.email "bot@hornupdates.com"
          git add articles.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Auto-update articles $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
