name: Update Articles

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install feedparser openai

      - name: Update articles
        run: python update_articles.py

      - name: Generate daily opinion article (6 AM run only)
        id: generate_opinion
        if: github.event_name == 'workflow_dispatch' || contains(github.event.schedule, '0 6')
        run: python generate_opinion.py
        continue-on-error: true

      - name: Notify on opinion generation failure
        if: steps.generate_opinion.outcome == 'failure'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Opinion article generation failed — ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '## Daily opinion article generation failed',
              '',
              `**Workflow run:** [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              'The `generate_opinion.py` step failed (likely an OpenAI API error or quota issue). ' +
              'Regular article updates were **not affected** — only today\'s opinion article is missing.',
              '',
              'Check the workflow run logs linked above for the full error details.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'opinion-failure',
            });

            const alreadyOpen = issues.some(i => i.title === title);
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['opinion-failure'],
              });
            }

      - name: Commit and push
        run: |
          git config user.name "Horn Updates Bot"
          git config user.email "bot@hornupdates.com"
          git add articles.json opinion.html opinion-auto-*.html sitemap.xml robots.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update articles + opinion $(date -u '+%Y-%m-%d %H:%M UTC') [skip actions]"
            git pull --rebase origin main
            git push
          fi
