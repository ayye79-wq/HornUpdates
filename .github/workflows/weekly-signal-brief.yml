name: Weekly Signal Brief Update

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Signal Brief week and issue number
        run: |
          python3 << 'EOF'
          import re
          from datetime import datetime, timedelta

          today = datetime.utcnow()
          monday = today - timedelta(days=today.weekday())
          sunday = monday + timedelta(days=6)

          months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December']

          def fmt_week(m, s):
              if m.month == s.month:
                  return f"{months[m.month-1]} {m.day} to {s.day}, {s.year}"
              return f"{months[m.month-1]} {m.day} to {months[s.month-1]} {s.day}, {s.year}"

          new_week = fmt_week(monday, sunday)

          with open('signal-brief.html', 'r', encoding='utf-8') as f:
              content = f.read()

          week_match = re.search(r'Week of ([A-Za-z]+ \d+ to [A-Za-z]* ?\d+, \d+)', content)
          issue_match = re.search(r'Issue (\d+)', content)

          if not week_match or not issue_match:
              print("Could not find week or issue markers — skipping")
              exit(0)

          current_week = week_match.group(1)
          current_issue = int(issue_match.group(1))
          new_issue = current_issue + 1

          if current_week == new_week:
              print(f"Already up to date: {current_week}")
              exit(0)

          # Update the week date (first occurrence only)
          content = content.replace(f'Week of {current_week}', f'Week of {new_week}', 1)

          # Update issue number in the header line
          content = re.sub(r'(·\s*Issue )\d+', lambda m: m.group(1) + str(new_issue), content, count=1)

          # Prepend a new archive entry before the first existing archive link
          new_entry = f'    <a class="archive-link" href="/signal-brief.html">Issue {current_issue}: {current_week} <span>&#8594;</span></a>\n'
          marker = '<a class="archive-link"'
          idx = content.find(marker)
          if idx >= 0:
              content = content[:idx] + new_entry + content[idx:]

          with open('signal-brief.html', 'w', encoding='utf-8') as f:
              f.write(content)

          print(f"Updated: Issue {current_issue} to {new_issue}")
          print(f"Week: {current_week} to {new_week}")
          EOF

      - name: Commit if changed
        run: |
          git config user.name "Horn Updates Bot"
          git config user.email "bot@hornupdates.com"
          git add signal-brief.html
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "Auto: Signal Brief Issue update $(date -u '+%Y-%m-%d') [skip ci]"
            git push
          )
