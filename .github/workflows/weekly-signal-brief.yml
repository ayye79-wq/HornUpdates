name: Weekly Signal Brief Update

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-brief:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Signal Brief week and issue number
        run: python3 scripts/update_signal_brief.py

      - name: Prefill What to Watch bullets
        run: python3 scripts/prefill_what_to_watch.py --write

      - name: Commit if changed
        run: |
          git config user.name "Horn Updates Bot"
          git config user.email "bot@hornupdates.com"
          git add signal-brief.html
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Auto: Signal Brief Issue update $(date -u '+%Y-%m-%d') [skip ci]"
          git push || echo "Nothing to push"
