  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;

    .btn {
      display: inline-block;
      padding: 10px 12px;
      border-radius: 12px;

    .meta { color:#6b7280; font-size:.95rem; display:flex; gap:10px; flex-wrap:wrap; }
    .pill { background:#f3f4f6; padding:4px 10px; border-radius:999px; font-size:.85rem; }

    .summary { font-size:1.02rem; white-space:pre-wrap; }
    .divider { height:1px; background:#e5e7eb; margin:14px 0; }

    .rtl {
      direction: rtl;
      text-align: right;
      line-height: 1.9;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;

    /* Collapse ad slot when AdSense doesn't fill it */

    .reader-ad-slot.empty { display: none; }
    ins.adsbygoogle[data-ad-status="unfilled"] {

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <a href="index.html">Horn Updates</a>
        <span class="muted">• Signal Brief</span>
      </div>
      <div class="actions">
        <a class="btn" href="#" id="readFull">Read full article ↗</a>
        <a class="btn secondary" href="#" id="shareNative">Share</a>
      </div>
    </div>

    <div class="card">
      <div class="meta">
        <span class="pill" id="sourcePill">Source</span>
        <span class="pill" id="datePill">Date</span>
        <span class="pill" id="countryPill" style="display:none;"></span>
      </div>

      <!-- Interpretive headline (generated from summary) -->
      <div style="font-size:.7rem;font-weight:700;color:#6b7280;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;">Horn Updates · Signal Brief</div>
      <h1 id="signal-headline" style="font-size:1.35rem;font-weight:800;line-height:1.25;margin:0 0 10px;color:#111827;">Loading…</h1>
      <div id="original-title" style="font-size:.82rem;color:#9ca3af;border-left:3px solid #e5e7eb;padding-left:10px;margin-bottom:4px;font-style:italic;"></div>

      <div class="divider"></div>

      <div id="brief-loading" class="muted" style="font-size:.95rem;">Loading brief…</div>

      <div id="brief-body" style="display:none;">

        <div style="margin-bottom:18px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <span style="width:10px;height:10px;border-radius:2px;background:#2563eb;flex-shrink:0;"></span>
            <span style="font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#2563eb;">What happened</span>
          </div>
          <p id="brief-what" style="margin:0;font-size:1rem;line-height:1.75;color:#111827;"></p>
        </div>

        <div id="brief-why-wrap" style="margin-bottom:18px;display:none;background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:14px 16px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <span style="width:10px;height:10px;border-radius:2px;background:#d97706;flex-shrink:0;"></span>
            <span style="font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#d97706;">Why it matters</span>
          </div>
          <p id="brief-why" style="margin:0;font-size:.96rem;line-height:1.75;color:#374151;font-weight:500;"></p>
        </div>

        <div id="brief-pattern-wrap" style="margin-bottom:18px;display:none;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:12px;padding:14px 16px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <span style="width:10px;height:10px;border-radius:2px;background:#7c3aed;flex-shrink:0;"></span>
            <span style="font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7c3aed;">Bigger picture</span>
          </div>
          <p id="brief-pattern" style="margin:0;font-size:.92rem;line-height:1.7;color:#4c1d95;"></p>
        </div>

        <div id="brief-watch-wrap" style="margin-bottom:4px;display:none;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <span style="width:10px;height:10px;border-radius:2px;background:#dc2626;flex-shrink:0;"></span>
            <span style="font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#dc2626;">What to watch</span>
          </div>
          <p id="brief-watch" style="margin:0;font-size:.96rem;line-height:1.75;color:#374151;"></p>
        </div>

      </div>

      <div class="divider"></div>

      <div style="font-size:.82rem;color:#6b7280;line-height:1.6;">
        Source: <strong id="attr-source">publisher</strong> (original reporting) ·
        <a id="readFull2" href="#" style="color:#2563eb;font-weight:600;">Read full article ↗</a>
      </div>

      <!-- AdSense: Reader Ad (below attribution) -->
      <div class="reader-ad-slot" id="reader-ad-wrap">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-7773342225754932"
             data-ad-slot="8296199432"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
          (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
      </div>
    </div>
  </div>


  <script>
    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function isArabic(text) {
      return /[\u0600-\u06FF]/.test(text || "");
    }

    function norm(u) {
      try {
        const x = new URL(u);
        return x.hostname.replace(/^www\./, "") + x.pathname.replace(/\/$/, "");
      } catch { return ""; }
    }

    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = (Math.imul(31, hash) + str.charCodeAt(i)) | 0;
      }
      return hash;
    }

    function getContextForArticle(article, templates) {
      // Prefer AI-generated article-specific context if available
      if (article.context) return article.context;

      if (!templates || !templates.groups) return null;
      const text = [
        article.title || "",
        article.summary || "",
        ...(article.topic_tags || []),
        ...(article.country_tags || []),
      ].join(" ").toLowerCase();

      const sorted = [...templates.groups].sort((a, b) => (b.priority || 0) - (a.priority || 0));
      for (const group of sorted) {
        const { match, templates: tmplList } = group;
        if (!match || !tmplList || !tmplList.length) continue;
        const keywordsMatch = (match.any_keyword || []).some(kw => text.includes(kw.toLowerCase()));
        const catMatch = (match.any_category || []).some(cat => text.includes(cat.toLowerCase()));
        if (keywordsMatch || catMatch) {
          const idx = Math.abs(simpleHash(article.title || "")) % tmplList.length;
          return tmplList[idx].text;
        }
      }
      return (templates.default && templates.default.text) || null;
    }

    async function load() {
      const articleUrl = getParam("url");
      if (!articleUrl) { window.location.href = "index.html"; return; }

      document.getElementById("readFull").href = articleUrl;

      try {
        const [dataRes, tmplRes] = await Promise.all([
          fetch("articles.json", { cache: "no-store" }),
          fetch("why_matters_templates.json").catch(() => null),
        ]);
        const data = await dataRes.json();
        const templates = tmplRes ? await tmplRes.json().catch(() => null) : null;

        const articles = Array.isArray(data) ? data : (data.articles || []);
        const target = norm(articleUrl);

        const match = articles.find(a => norm(a.source_url || a.link || "") === target);
        if (!match) {
          document.getElementById("signal-headline").textContent = "Article not found";
          document.getElementById("brief-loading").textContent = "We could not match this article yet. You can still read the full story at the source.";
          return;
        }

        // Strip RSS footer artifacts
        let cleanSummary = (match.summary || "")
          .replace(/The post .{0,120}? (appeared first|first appeared) on .{0,80}?\.\s*$/i, "")
          .replace(/This article .{0,80}? first appeared on .{0,80}?\.\s*$/i, "")
          .replace(/Originally published (at|on|by) .{0,80}?\.\s*$/i, "")
          .trim();

        // — Interpretive headline from first sentence of summary —
        function makeHeadline(text) {
          const sentences = text.match(/[^.!?]+[.!?]+/g) || [];
          const first = (sentences[0] || text).trim().replace(/[.!?]+$/, "");
          return first.length <= 110 ? first : first.slice(0, 107) + "…";
        }
        const headline = makeHeadline(cleanSummary) || (match.title || "Signal Brief");
        document.getElementById("signal-headline").textContent = headline;
        if (match.title && match.title !== headline) {
          document.getElementById("original-title").textContent = "Via " + (match.source_name || "source") + ": \u201c" + match.title + "\u201d";
        }

        // — What happened —
        document.getElementById("brief-what").textContent = cleanSummary;

        // — What to watch (country-specific) —
        const watchMap = {
          "Sudan":       "Watch for RSF movements around El Fasher, humanitarian corridor talks, and any new ceasefire framework from AU or IGAD.",
          "Ethiopia":    "Watch for federal government statements, Pretoria peace process updates, and any flashpoints in Amhara or Oromia regions.",
          "Somalia":     "Watch for Al-Shabaab territorial activity, ATMIS transition progress, and federal-state political tensions in Mogadishu.",
          "South Sudan": "Watch for delays or violence ahead of the 2026 election timeline, and food security conditions in Unity and Jonglei states.",
          "Eritrea":     "Watch for rare diplomatic signals from Asmara — public silence from Eritrea often precedes quiet backroom moves.",
          "Djibouti":    "Watch for shifts in base agreements with major powers and any changes to Ethiopia's port access arrangements.",
          "Kenya":       "Watch for government economic policy announcements, security responses in northern Kenya, and regional mediation activity.",
        };

        // — Bigger Picture (country-specific context) —
        const bigPictureMap = {
          "Sudan":       "Sudan's conflict has displaced over 12 million people — the largest displacement crisis on earth. Over 150,000 are estimated dead. No peace deal exists as of 2026. The war is not just military: it is the collapse of a decade-long transition from dictatorship.",
          "Kenya":       "Kenya records over 3,000 road fatalities annually — among the highest per capita in sub-Saharan Africa. Enforcement corruption and aging transport fleets are recurring factors. Without structural reform of the NTSA and licensing systems, similar incidents will continue.",
          "Ethiopia":    "Ethiopia is the Horn's economic and diplomatic anchor — home to 120M+ people and the African Union headquarters. Its internal conflicts since 2018 have cost an estimated $3B+ in output losses and tested the federalist framework on which the country's stability depends.",
          "Somalia":     "Al-Shabaab has operated for 15+ years despite billions in international counterterrorism spending. The group controls 20–30% of Somali territory and generates over $100M annually through taxation. Military pressure alone has not broken its resilience.",
          "South Sudan": "South Sudan has missed three consecutive election deadlines since independence in 2011. Over 2 million people remain internally displaced. The country's political elite has repeatedly chosen power-sharing deals that freeze conflict rather than resolve it.",
          "Eritrea":     "Eritrea has no independent press, no elections, and enforces indefinite national service. It is ranked among the least free countries on earth — yet its Red Sea ports and military capability make it a pivotal regional actor that other governments cannot ignore.",
          "Djibouti":    "Djibouti hosts military bases from the US, France, China, Japan and Italy — making it the world's most military-dense small state. Its port handles 95% of Ethiopia's trade. What happens in Djibouti directly affects 120 million Ethiopians.",
        };

        const countries = match.country_tags || [];

        const watchText = countries.map(c => watchMap[c]).filter(Boolean)[0]
          || "Watch for official responses and regional diplomatic reactions as this story develops.";
        document.getElementById("brief-watch").textContent = watchText;
        document.getElementById("brief-watch-wrap").style.display = "";

        const patternText = countries.map(c => bigPictureMap[c]).filter(Boolean)[0];
        if (patternText) {
          document.getElementById("brief-pattern").textContent = patternText;
          document.getElementById("brief-pattern-wrap").style.display = "";
        }

        // Show brief
        document.getElementById("brief-loading").style.display = "none";
        document.getElementById("brief-body").style.display = "";

        // Pills & attribution
        if (match.source_name) document.getElementById("attr-source").textContent = match.source_name;
        document.getElementById("readFull2").href = articleUrl;
        document.getElementById("sourcePill").textContent = match.source_name || "publisher";
        document.getElementById("datePill").textContent =
          match.published_at ? new Date(match.published_at).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : "—";
        if (countries.length) {
          const c = document.getElementById("countryPill");
          c.style.display = "inline-block";
          c.textContent = countries.join(" · ");
        }

        // JSON-LD structured data
        const ld = {
          "@context": "https://schema.org",
          "@type": "NewsArticle",
          "headline": match.title || "",
          "description": (match.summary || "").slice(0, 300),
          "datePublished": match.published_at || "",
          "author": {"@type": "Organization", "name": match.source_name || "Horn Updates"},
          "publisher": {
            "@type": "Organization",
            "name": "Horn Updates",
            "url": "https://hornupdates.com",
            "logo": {"@type": "ImageObject", "url": "https://hornupdates.com/Horn1_logo.png"}
          },
          "url": articleUrl,
          "keywords": [...(match.country_tags || []), ...(match.topic_tags || [])].join(", ")
        };
        const ldScript = document.createElement("script");
        ldScript.type = "application/ld+json";
        ldScript.textContent = JSON.stringify(ld);
        document.head.appendChild(ldScript);

        const rtl = isArabic(cleanSummary) || isArabic(match.title);
        if (rtl) {
          document.getElementById("brief-what").classList.add("rtl");
          document.getElementById("signal-headline").classList.add("rtl");
        }

        if (templates) {
          const ctx = getContextForArticle(match, templates);
          if (ctx) {
            document.getElementById("brief-why").textContent = ctx;
            document.getElementById("brief-why-wrap").style.display = "";
          }
        }

      } catch (e) {
        document.getElementById("signal-headline").textContent = "Error";
        document.getElementById("brief-loading").textContent = "Could not load articles. Please try again.";
      }
    }

    load();
  </script>
  <script>
    document.getElementById("shareNative")?.addEventListener("click", async (e) => {
      e.preventDefault();
      const url = window.location.href;
      if (navigator.share) {
        await navigator.share({
          title: document.getElementById("signal-headline").textContent,
          url
        });
      } else {
        await navigator.clipboard.writeText(url);
        alert("Link copied");
      }
    });
  </script>
  <script>
    /* Collapse the ad wrapper if no ad fills within 2.5 seconds */
    setTimeout(() => {
      const wrap = document.getElementById("reader-ad-wrap");
      if (!wrap) return;
      const ins = wrap.querySelector("ins.adsbygoogle");
      if (ins && ins.dataset.adStatus !== "filled") {
        wrap.classList.add("empty");
      }
    }, 2500);
  </script>
