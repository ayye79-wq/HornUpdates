<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Horn Updates • Reader</title>
  <link rel="stylesheet" href="style.css" />

  <script async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7773342225754932"
    crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #f5f6f8;
      color: #111827;
      line-height: 1.6;
    }
    .wrap { max-width: 920px; margin: 0 auto; padding: 18px; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-bottom: 14px;
    }
    .brand a { text-decoration: none; color: #111827; font-weight: 900; }
    .btn {
      display: inline-block;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      background: #fff;
      color: #111827;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }
    .btn.secondary { background:#f3f4f6; font-weight:600; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }

    .card {
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:18px;
      box-shadow:0 10px 28px rgba(0,0,0,.06);
      padding:18px;
    }
    .meta { color:#6b7280; font-size:.95rem; display:flex; gap:10px; flex-wrap:wrap; }
    .pill { background:#f3f4f6; padding:4px 10px; border-radius:999px; font-size:.85rem; }
    h1 { font-size:1.4rem; margin:10px 0; }
    .summary { font-size:1.02rem; white-space:pre-wrap; }
    .divider { height:1px; background:#e5e7eb; margin:14px 0; }
    .muted { color:#6b7280; }

    .rtl {
      direction: rtl;
      text-align: right;
      line-height: 1.9;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    }

    /* Collapse ad slot when AdSense doesn't fill it */
    .reader-ad-slot { margin-top: 16px; overflow: hidden; }
    .reader-ad-slot.empty { display: none; }
    ins.adsbygoogle[data-ad-status="unfilled"] {
      display: none !important;
      height: 0 !important;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <a href="index.html">Horn Updates</a>
        <span class="muted">• Reader</span>
      </div>

      <div class="actions">
        <a class="btn" href="#" id="readFull">Read full article ↗</a>
        <a class="btn secondary" href="#" id="shareNative">Share</a>
      </div>
    </div>

    <div class="card">
      <div class="meta">
        <span class="pill" id="sourcePill">Source</span>
        <span class="pill" id="datePill">Date</span>
        <span class="pill" id="countryPill" style="display:none;"></span>
      </div>

      <h1 id="title">Loading…</h1>

      <div class="divider"></div>

      <div id="summary" class="summary">
        <span class="muted">Loading summary…</span>
      </div>

      <div id="context-section" style="display:none;">
        <div class="divider"></div>
        <details class="reader-context-box" open>
          <summary class="reader-context-toggle">
            &#9432; Background &amp; Context
          </summary>
          <p id="context-text" class="reader-context-body"></p>
        </details>
      </div>

      <div class="divider"></div>

      <div class="muted" style="font-size:.95rem;">
        <strong>Attribution:</strong>
        This summary is written by Horn Updates.
        Full article remains on the publisher's website.
      </div>

      <!-- AdSense: Reader Ad (below attribution) -->
      <div class="reader-ad-slot" id="reader-ad-wrap">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-7773342225754932"
             data-ad-slot="8296199432"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
          (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
      </div>
    </div>
  </div>

  <script>
    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function isArabic(text) {
      return /[\u0600-\u06FF]/.test(text || "");
    }

    function norm(u) {
      try {
        const x = new URL(u);
        return x.hostname.replace(/^www\./, "") + x.pathname.replace(/\/$/, "");
      } catch { return ""; }
    }

    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = (Math.imul(31, hash) + str.charCodeAt(i)) | 0;
      }
      return hash;
    }

    function getContextForArticle(article, templates) {
      if (!templates || !templates.groups) return null;
      const text = [
        article.title || "",
        article.summary || "",
        ...(article.topic_tags || []),
        ...(article.country_tags || []),
      ].join(" ").toLowerCase();

      const sorted = [...templates.groups].sort((a, b) => (b.priority || 0) - (a.priority || 0));
      for (const group of sorted) {
        const { match, templates: tmplList } = group;
        if (!match || !tmplList || !tmplList.length) continue;
        const keywordsMatch = (match.any_keyword || []).some(kw => text.includes(kw.toLowerCase()));
        const catMatch = (match.any_category || []).some(cat => text.includes(cat.toLowerCase()));
        if (keywordsMatch || catMatch) {
          const idx = Math.abs(simpleHash(article.title || "")) % tmplList.length;
          return tmplList[idx].text;
        }
      }
      return (templates.default && templates.default.text) || null;
    }

    async function load() {
      const articleUrl = getParam("url");
      if (!articleUrl) { window.location.href = "index.html"; return; }

      document.getElementById("readFull").href = articleUrl;

      try {
        const [dataRes, tmplRes] = await Promise.all([
          fetch("articles.json", { cache: "no-store" }),
          fetch("why_matters_templates.json").catch(() => null),
        ]);
        const data = await dataRes.json();
        const templates = tmplRes ? await tmplRes.json().catch(() => null) : null;

        const articles = Array.isArray(data) ? data : (data.articles || []);
        const target = norm(articleUrl);

        const match = articles.find(a => norm(a.source_url || a.link || "") === target);
        if (!match) {
          document.getElementById("title").textContent = "Article";
          document.getElementById("summary").textContent =
            "We could not match this article in articles.json yet. You can still read the full story.";
          return;
        }

        document.getElementById("title").textContent = match.title || "Article";
        document.getElementById("summary").textContent = match.summary || "";

        document.getElementById("sourcePill").textContent =
          "Source: " + (match.source_name || "Source");
        document.getElementById("datePill").textContent =
          "Date: " + (match.published_at ? new Date(match.published_at).toLocaleDateString() : "—");

        if (Array.isArray(match.country_tags) && match.country_tags.length) {
          const c = document.getElementById("countryPill");
          c.style.display = "inline-block";
          c.textContent = "Country: " + match.country_tags.join(", ");
        }

        const sumEl = document.getElementById("summary");
        const rtl = isArabic(match.summary) || isArabic(match.title);
        if (rtl) {
          sumEl.classList.add("rtl");
          document.getElementById("title").classList.add("rtl");
        }

        if (templates) {
          const ctx = getContextForArticle(match, templates);
          if (ctx) {
            document.getElementById("context-text").textContent = ctx;
            document.getElementById("context-section").style.display = "";
          }
        }

      } catch (e) {
        document.getElementById("title").textContent = "Error";
        document.getElementById("summary").textContent = "Could not load articles.json.";
      }
    }

    load();
  </script>
  <script>
    document.getElementById("shareNative")?.addEventListener("click", async (e) => {
      e.preventDefault();
      const url = window.location.href;
      if (navigator.share) {
        await navigator.share({
          title: document.getElementById("title").textContent,
          url
        });
      } else {
        await navigator.clipboard.writeText(url);
        alert("Link copied");
      }
    });
  </script>
  <script>
    /* Collapse the ad wrapper if no ad fills within 2.5 seconds */
    setTimeout(() => {
      const wrap = document.getElementById("reader-ad-wrap");
      if (!wrap) return;
      const ins = wrap.querySelector("ins.adsbygoogle");
      if (ins && ins.dataset.adStatus !== "filled") {
        wrap.classList.add("empty");
      }
    }, 2500);
  </script>
</body>
</html>
